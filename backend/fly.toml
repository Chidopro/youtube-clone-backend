# fly.toml app configuration file for ScreenMerch backend

app = "screenmerch"
primary_region = "sjc"

[build]
  # Use this directory's Dockerfile and context (works when repo root is backend or when run from backend/)
  dockerfile = "Dockerfile"
  context = "."

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[env]
  PORT = "8080"
  SUPABASE_URL = "https://sojxbydpcdcdzfdtbypd.supabase.co"
  # Note: Sensitive keys should be set via fly secrets, not in fly.toml
  # fly secrets set SUPABASE_ANON_KEY=...  (must be the anon key for the project above)
