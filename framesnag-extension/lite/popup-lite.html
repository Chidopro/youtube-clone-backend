<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FrameSnag - For ScreenMerch Creators</title>
  <style>
    body {
      width: 300px;
      padding: 0;
      font-family: Arial, sans-serif;
      background: white;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      width: 100%;
      background: #1a1a2e;
      color: white;
      padding: 15px 12px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 2px;
    }
    .header .subtitle {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
    }
    .content {
      padding: 10px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    button {
      width: 260px;
      margin: 6px auto;
      padding: 12px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      display: block;
      transition: background 0.2s;
    }
    .btn-thumb { 
      background: #ff6b35; 
      color: white; 
    }
    .btn-thumb:hover { 
      background: #e55a2b; 
    }
    .btn-shot { 
      background: #3f51b5; 
      color: white; 
    }
    .btn-shot:hover { 
      background: #303f9f; 
    }
    .resolution-selector {
      width: 260px;
      margin: 8px auto;
    }
    .resolution-selector select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 14px;
      background: #f9f9f9;
    }
    .preview img {
      width: 100%;
      border: 2px solid #eee;
      border-radius: 6px;
      display: none;
      margin-top: 10px;
    }
    .screenshot-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
      margin-top: 10px;
    }
    .screenshot-item {
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid #eee;
    }
    .screenshot-item img {
      width: 100%;
      display: block;
    }
    .screenshot-action-row {
      display: flex;
      gap: 0;
      margin: 0;
    }
    .screenshot-action-row button {
      flex: 1 1 0;
      height: 36px;
      margin: 0;
      border-radius: 0;
      font-size: 10px;
      font-weight: bold;
      padding: 0 4px;
      border: none;
      cursor: pointer;
      width: auto;
    }
    .screenshot-action-row .download-btn {
      background: #4caf50;
      color: white;
    }
    .screenshot-action-row .download-btn:hover {
      background: #45a049;
    }
    .screenshot-action-row .delete-btn {
      background: #e53935;
      color: white;
    }
    .screenshot-action-row .delete-btn:hover {
      background: #b71c1c;
    }
    .thumb-container {
      width: 260px;
      margin: 10px auto;
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid #eee;
    }
    .thumb-container img {
      width: 100%;
      display: block;
    }
    .thumb-action-row {
      display: flex;
      gap: 0;
      margin: 0;
    }
    .thumb-action-row button {
      flex: 1 1 0;
      height: 36px;
      margin: 0;
      border-radius: 0;
      font-size: 12px;
      font-weight: bold;
      padding: 0;
      border: none;
      cursor: pointer;
      width: auto;
    }
    .thumb-action-row .download-btn {
      background: #4caf50;
      color: white;
    }
    .thumb-action-row .download-btn:hover {
      background: #45a049;
    }
    .thumb-action-row .delete-btn {
      background: #e53935;
      color: white;
    }
    .thumb-action-row .delete-btn:hover {
      background: #b71c1c;
    }
    .thumb-action-row .favorites-btn,
    .screenshot-action-row .favorites-btn {
      background: #009688;
      color: white;
    }
    .thumb-action-row .favorites-btn:hover,
    .screenshot-action-row .favorites-btn:hover {
      background: #00796b;
    }
    .free-badge {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      margin: 8px 0;
    }
    .info-text {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-top: 10px;
      padding: 0 10px;
    }
    .disclaimer {
      font-size: 10px;
      color: #666;
      text-align: center;
      margin: 6px 10px;
      padding: 6px 8px;
      background: #f5f5f5;
      border-radius: 4px;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>FRAMESNAG</h1>
    <div class="subtitle">by ScreenMerch</div>
  </div>
  
  <div class="content">
    <span class="free-badge">For ScreenMerch Creators Only</span>
    <p class="disclaimer">Use only with content you own or have permission to use. Do not capture or distribute others' copyrighted content.</p>
    
    <div class="resolution-selector">
      <select id="resolutionSelect">
        <option value="maxresdefault">Maximum Resolution (1920x1080)</option>
        <option value="hqdefault">High Quality (480x360)</option>
        <option value="sddefault">Standard Quality (640x480)</option>
      </select>
    </div>

    <button id="captureBtn" class="btn-thumb">Grab Thumbnail</button>
    <button id="screenshotBtn" class="btn-shot">Grab Screenshot</button>

    <div id="thumbnailContainer" class="thumb-container" style="display: none;">
      <img id="preview-image" src="" alt="Thumbnail Preview">
      <div class="thumb-action-row">
        <button class="favorites-btn" id="addThumbToFavoritesBtn">Add to Favorites</button>
        <button class="download-btn" id="downloadThumbBtn">Download</button>
        <button class="delete-btn" id="deleteThumbBtn">Delete</button>
      </div>
    </div>

    <div class="screenshot-grid" id="screenshotGrid">
      <!-- Dynamically filled -->
    </div>

    <p class="info-text">Capture frames from your own videos for your ScreenMerch merch. Free, no limits.</p>
  </div>

  <script src="popup-lite.js"></script>
</body>
</html>
